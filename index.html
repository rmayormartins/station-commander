<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Commander — ISS Mission Control Dashboard</title>
<meta name="description" content="Real-time ISS mission control dashboard organized by flight console (TOPO, ETHOS, SPARTAN, ADCO, VVO, CATO, ROBO, ODIN, EVA, CAPCOM). 200+ telemetry points.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#21262d;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#30363d}
  html,body{
    background:#0d1117;
    font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    color:#c9d1d9;
    min-height:100vh;
    font-size:13px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body{overflow-x:hidden}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes dot{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  #root{min-height:100vh}
  .btn{cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s}
  .caret{display:inline-block;width:8px;height:14px;background:#58a6ff;animation:blink 1.1s infinite;vertical-align:middle;margin-left:2px}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  .console-card{
    border:1px solid #21262d;
    background:#0f141a;
    border-radius:6px;
    padding:14px 16px;
    margin-bottom:12px;
    transition:border-color .2s;
  }
  .console-card:hover{border-color:#30363d}
  .console-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid #21262d;
  }
  .console-tag{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.5px;
    padding:2px 7px;
    border-radius:3px;
    text-transform:uppercase;
  }
  .progress-track{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin-top:4px}
  .progress-fill{height:100%;border-radius:2px;transition:width .5s ease-out}
  .tm-row{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;font-size:10px;border-bottom:1px dotted #21262d}
  .tm-row:last-child{border-bottom:none}
  .tm-label{color:#8b949e;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
  .tm-val{color:#c9d1d9;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
  .tm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:6px;margin-top:6px}
  .tm-group{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px}
  .tm-group-title{font-size:9px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding-bottom:6px;margin-bottom:4px;border-bottom:1px solid #21262d}
  .sparkline-box{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px 10px;margin-bottom:8px}
  .subcard{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px 10px;margin-bottom:6px}
  details{cursor:pointer}
  summary{list-style:none;outline:none}
  summary::-webkit-details-marker{display:none}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

</head>

const isLand = (lat,lon) => LAND_REGIONS.some(r => lat>=r.latMin && lat<=r.latMax && lon>=r.lonMin && lon<=r.lonMax);

function simulateOrbit(t, inc, perMin, phase) {
  phase = phase || 0;
  var perMs = perMin*60*1000;
  var frac = ((t+phase)%perMs)/perMs;
  var rawLon = (frac*360+180)%360 - 180;
  var earthRot = ((t/60000)*0.25)%360;
  var lon = ((rawLon - earthRot + 540) % 360) - 180;
  var lat = inc * Math.sin(frac*2*Math.PI);
  return {latitude:lat, longitude:lon};
}

function StationCommander() {
  const [iss, setIss] = useState(null);
  const [time, setTime] = useState(Date.now());
  const [issTrail, setIssTrail] = useState([]);
  const [apiStatus, setApiStatus] = useState("connecting");
  const [telemetry, setTelemetry] = useState({});
  const [history, setHistory] = useState({});
  const [lsStatus, setLsStatus] = useState("connecting");

  // ─── ISS POSITION ──────────────────────────────────────────────────
  const fetchISS = useCallback(function(){
    fetch("https://api.wheretheiss.at/v1/satellites/25544")
      .then(function(r){if(!r.ok)throw new Error();return r.json();})
      .then(function(d){
        setIss(Object.assign({},d,{live:true}));
        setApiStatus("online");
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      })
      .catch(function(){
        setApiStatus("offline");
        var s=simulateOrbit(Date.now(),51.64,92.68,0);
        var d={latitude:s.latitude,longitude:s.longitude,altitude:418+Math.random()*5,velocity:27580+Math.random()*40,visibility:Math.random()>0.4?"daylight":"eclipsed",live:false};
        setIss(d);
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      });
  },[]);

  // ─── LIGHTSTREAMER ──────────────────────────────────────────────────
  useEffect(function(){
    let client, sub;
    let retries = 0;
    function tryConnect(){
      const Ls = window.Ls || window.lightstreamer;
      if(!Ls || !Ls.LightstreamerClient){
        retries++;
        if(retries < 30){
          setTimeout(tryConnect, 300);
        } else {
          console.warn("[LS] library not loaded after 30 retries");
          setLsStatus("library-missing");
        }
        return;
      }
      try {
        console.log("[LS] Connecting to push.lightstreamer.com / ISSLIVE ...");
        client = new Ls.LightstreamerClient("https://push.lightstreamer.com","ISSLIVE");
        client.addListener({
          onStatusChange: function(status){
            console.log("[LS] status:", status);
            if(status.indexOf("CONNECTED") === 0) setLsStatus("online");
            else if(status.indexOf("DISCONNECTED") === 0) setLsStatus("offline");
            else if(status.indexOf("STALLED") === 0) setLsStatus("stalled");
            else setLsStatus("connecting");
          },
          onServerError: function(code, msg){
            console.error("[LS] server error:", code, msg);
            setLsStatus("error");
          }
        });
        client.connect();
        const symbols = Object.keys(TELEMETRY);
        sub = new Ls.Subscription("MERGE", symbols, ["TimeStamp","Value"]);
        sub.setRequestedSnapshot("yes");
        sub.setRequestedMaxFrequency("1.0");
        sub.addListener({
          onSubscription: function(){ console.log("[LS] subscribed OK"); },
          onSubscriptionError: function(code, msg){ console.error("[LS] sub error:", code, msg); },
          onItemUpdate: function(update){
            const itemName = update.getItemName();
            const value = update.getValue("Value");
            const ts = update.getValue("TimeStamp");
            if(value === null || value === undefined) return;
            setTelemetry(function(prev){ return Object.assign({},prev,{[itemName]:{value:value,ts:ts}}); });
            if(TELEMETRY[itemName] && TELEMETRY[itemName].chart){
              const numV = parseFloat(value);
              if(!isNaN(numV)){
                setHistory(function(prev){
                  const arr = (prev[itemName] || []).concat([{t:Date.now(), v:numV}]);
                  return Object.assign({}, prev, {[itemName]: arr.slice(-60)});
                });
              }
            }
          }
        });
        client.subscribe(sub);
      } catch(e) {
        console.error("[LS] init error:",e);
        setLsStatus("error");
      }
    }
    tryConnect();
    return function(){ try { if(client) client.disconnect(); } catch(e){} };
  },[]);

  // ─── SIMULATED FALLBACK: keep history populated even without LS ────
  useEffect(function(){
    const i = setInterval(function(){
      // For each chart symbol, if no real data yet, push a simulated value
      setHistory(function(prev){
        const next = Object.assign({}, prev);
        Object.keys(TELEMETRY).forEach(function(sym){
          const meta = TELEMETRY[sym];
          if(!meta.chart) return;
          // If we have real LS data, do nothing
          if(telemetry[sym]) return;
          // Simulate
          const base = typeof meta.fallback === "number" ? meta.fallback : 0;
          const j = meta.jitter || 0;
          const v = base + (Math.random()*2-1)*j*2;
          const arr = (next[sym] || []).concat([{t:Date.now(), v:v}]);
          next[sym] = arr.slice(-60);
        });
        return next;
      });
    }, 2000);
    return function(){ clearInterval(i); };
  },[telemetry]);

  useEffect(function(){
    fetchISS();
    var i=setInterval(function(){fetchISS();},5000);
    return function(){clearInterval(i);};
  },[fetchISS]);
  useEffect(function(){var i=setInterval(function(){setTime(Date.now());},1000);return function(){clearInterval(i);};},[]);

  const landDots = useMemo(function(){
    var d=[];
    for(var la=-58;la<=74;la+=2)for(var lo=-178;lo<=178;lo+=2)if(isLand(la,lo))d.push({la:la,lo:lo});
    return d;
  },[]);

  const contHab = new Date("2000-11-02T09:21:00Z").getTime();
  const habDays = Math.floor((time - contHab)/86400000);

    }
    // Simulated drift around fallback
    if(meta.fallback === undefined || meta.fallback === null) return "---";
    if(typeof meta.fallback === "number"){
      const j = meta.jitter || 0;
      // Time-based smooth drift instead of pure random for stability
      const driftSeed = Math.sin(Date.now()/8000 + sym.charCodeAt(0)) * j;
      return (meta.fallback + driftSeed).toString();
    }
    return meta.fallback.toString();
  },[telemetry]);

            <rect x="0" y={((90-51.64)/180)*460} width="1200" height={((90-(-51.64))/180)*460-((90-51.64)/180)*460} fill="#58a6ff05" stroke="#58a6ff15" strokeWidth="0.5" strokeDasharray="3,5"/>

            );}).filter(Boolean)}

              if(issTrail.length>=2){

              }
              const points=[];
              for(let k=0;k<=60;k++){
                const tFrac=k/60;
                const phaseT=(phaseFromLat+tFrac)%1;
                const lat=inc*Math.sin(phaseT*2*Math.PI);
                const groundDrift=tFrac*(-22.5);
                const orbitalLon=(iss.longitude+tFrac*360+groundDrift+540)%360-180;
                points.push({lat:lat,lon:orbitalLon});

          <div>Live telemetry: <a href="https://lightstreamer.com/customer-story/how-nasa-is-using-lightstreamer/" target="_blank" rel="noopener">Lightstreamer ISSLIVE feed</a> · Position: <a href="https://wheretheiss.at/w/developer" target="_blank" rel="noopener">wheretheiss.at</a></div>
          <div>Symbol dictionary: <a href="https://github.com/ISS-Mimic/Mimic" target="_blank" rel="noopener">ISS Mimic project</a> (MIT) · Crew: NASA MCC-H · Updated April 2026</div>
        </div>
      </div>

      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  SUB-COMPONENTS
// ═══════════════════════════════════════════════════════════════════════
function ConsoleCard({consoleInfo,children}){
  return (
    <div className="console-card" style={{borderLeft:"3px solid "+consoleInfo.color}}>
      <div className="console-header">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:consoleInfo.color,fontSize:14}}>{consoleInfo.icon}</span>
          <span className="console-tag" style={{color:consoleInfo.color,background:consoleInfo.color+"15",border:"1px solid "+consoleInfo.color+"33"}}>{consoleInfo.name}</span>
          <span style={{color:"#8b949e",fontSize:11}}>{consoleInfo.fullName}</span>
        </div>
      </div>
      {children}
    </div>
  );
}

function TmGroup({title, children}){
  return (
    <div className="tm-group">
      <div className="tm-group-title">▸ {title}</div>
      <div>{children}</div>
    </div>
  );
}

function Row({sym, tm, tmNum}){
  const meta = TELEMETRY[sym];
  if(!meta) return null;
  const raw = tm(sym);
  let display = raw;
  if(raw !== "---" && !isNaN(parseFloat(raw))){
    const n = parseFloat(raw);
    display = Math.abs(n) >= 10000 ? n.toFixed(0) : Math.abs(n) >= 100 ? n.toFixed(1) : Math.abs(n) >= 10 ? n.toFixed(2) : n.toFixed(3);
  }
  return (
    <div className="tm-row">
      <span className="tm-label" title={sym}>{meta.label}</span>
      <span className="tm-val">{display} <span style={{color:"#6e7681",fontSize:9}}>{meta.unit}</span></span>
    </div>
  );
}

function KV({l,v}){
  return (
    <div className="tm-row">
      <span className="tm-label">{l}</span>
      <span className="tm-val">{v}</span>
    </div>
  );
}

// Sparkline: mini SVG time-series chart
function Sparkline({title, data, color, unit}){
  const points = (data || []).filter(function(p){return !isNaN(p.v);});
  const hasData = points.length >= 2;

  let path = "";
  let areaPath = "";
  let latest = "---";
  let minV = 0, maxV = 0;

  if(hasData){
    const vs = points.map(function(p){return p.v;});
    minV = Math.min.apply(null, vs);
    maxV = Math.max.apply(null, vs);
    const range = (maxV - minV) || 1;
    const w = 260, h = 36;
    const step = w / (points.length - 1);
    path = points.map(function(p,i){
      const x = i*step;
      const y = h - ((p.v - minV)/range) * h;
      return (i===0?"M":"L") + x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ");
    areaPath = path + " L"+w+","+h+" L0,"+h+" Z";
    latest = points[points.length-1].v;
    if(Math.abs(latest) >= 100) latest = latest.toFixed(0);
    else if(Math.abs(latest) >= 10) latest = latest.toFixed(1);
    else latest = latest.toFixed(2);
  }

  const id = "grad-" + title.replace(/[^a-z0-9]/gi,"") + "-" + color.replace("#","");

  return (
    <div className="sparkline-box">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <span style={{fontSize:9,color:"#8b949e",textTransform:"uppercase",letterSpacing:0.5}}>{title}</span>
        <span style={{fontSize:11,color:color,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>
          {latest} <span style={{color:"#6e7681",fontSize:9}}>{unit}</span>
        </span>
      </div>
      <svg viewBox="0 0 260 36" style={{width:"100%",height:32,display:"block"}}>
        <defs>
          <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0.25,0.5,0.75].map(function(f){return (
          <line key={f} x1="0" y1={36*f} x2="260" y2={36*f} stroke="#21262d" strokeWidth="0.5" strokeDasharray="2,3"/>
        );})}
        {hasData ? (
          <g>
            <path d={areaPath} fill={"url(#"+id+")"}/>
            <path d={path} stroke={color} strokeWidth="1.5" fill="none"/>
            <circle cx={260} cy={36 - ((points[points.length-1].v - minV)/((maxV-minV)||1))*36} r="2" fill={color}/>
          </g>
        ) : (
          <text x="130" y="22" fill="#6e7681" fontSize="9" textAnchor="middle" fontFamily="monospace">acquiring data...</text>
        )}
      </svg>
      {hasData && (
        <div style={{fontSize:8,color:"#6e7681",display:"flex",justifyContent:"space-between",marginTop:2}}>
          <span>min {minV.toFixed(2)}</span>
          <span>{points.length} pts</span>
          <span>max {maxV.toFixed(2)}</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StationCommander/>);
