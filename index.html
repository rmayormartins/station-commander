<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Commander — ISS Mission Control Dashboard</title>
<meta name="description" content="Real-time ISS mission control dashboard with 200+ live telemetry points from NASA. Organized by flight console (TOPO, ETHOS, SPARTAN, ADCO, VVO, CAPCOM, INCO, ROBO).">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#21262d;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#30363d}
  html,body{
    background:#0d1117;
    font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    color:#c9d1d9;
    min-height:100vh;
    font-size:13px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body{overflow-x:hidden}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes dot{0%,100%{opacity:1}50%{opacity:.3}}
  #root{min-height:100vh}
  .btn{cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s}
  .caret{display:inline-block;width:8px;height:14px;background:#58a6ff;animation:blink 1.1s infinite;vertical-align:middle;margin-left:2px}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  .console-card{
    border:1px solid #21262d;
    background:#0f141a;
    border-radius:6px;
    padding:12px 14px;
    transition:border-color .2s;
  }
  .console-card:hover{border-color:#30363d}
  .console-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid #21262d;
  }
  .console-tag{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.5px;
    padding:2px 7px;
    border-radius:3px;
    text-transform:uppercase;
  }
  .progress-track{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin-top:4px}
  .progress-fill{height:100%;border-radius:2px;transition:width .5s ease-out}
  .tm-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:10px;border-bottom:1px dotted #21262d}
  .tm-row:last-child{border-bottom:none}
  .tm-label{color:#8b949e;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
  .tm-val{color:#c9d1d9;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
  details{cursor:pointer}
  summary{list-style:none;outline:none}
  summary::-webkit-details-marker{display:none}
  .sparkline-box{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:6px 8px;margin-top:6px}
  .subcard{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px 10px;margin-bottom:6px}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  {latMin:5,latMax:20,lonMin:117,lonMax:127},
];
const isLand = (lat,lon) => LAND_REGIONS.some(r => lat>=r.latMin && lat<=r.latMax && lon>=r.lonMin && lon<=r.lonMax);

function simulateOrbit(t, inc, perMin, phase) {
  phase = phase || 0;
  var perMs = perMin*60*1000;
  var frac = ((t+phase)%perMs)/perMs;
  var rawLon = (frac*360+180)%360 - 180;
  var earthRot = ((t/60000)*0.25)%360;
  var lon = ((rawLon - earthRot + 540) % 360) - 180;
  var lat = inc * Math.sin(frac*2*Math.PI);
  return {latitude:lat, longitude:lon};
}

function StationCommander() {
  const [iss, setIss] = useState(null);
  const [time, setTime] = useState(Date.now());
  const [issTrail, setIssTrail] = useState([]);
  const [apiStatus, setApiStatus] = useState("connecting");
  const [telemetry, setTelemetry] = useState({});
  const [history, setHistory] = useState({}); // { SYMBOL: [{t,v}, ...] }
  const [lsStatus, setLsStatus] = useState("connecting");

  // ─── ISS POSITION (wheretheiss.at) ─────────────────────────────────
  const fetchISS = useCallback(function(){
    fetch("https://api.wheretheiss.at/v1/satellites/25544")
      .then(function(r){if(!r.ok)throw new Error();return r.json();})
      .then(function(d){
        setIss(Object.assign({},d,{live:true}));
        setApiStatus("online");
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      })
      .catch(function(){
        setApiStatus("offline");
        var s=simulateOrbit(Date.now(),51.64,92.68,0);
        var d={latitude:s.latitude,longitude:s.longitude,altitude:408+Math.random()*5,velocity:27580+Math.random()*40,visibility:Math.random()>0.4?"daylight":"eclipsed",live:false};
        setIss(d);
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      });
  },[]);

  // ─── LIGHTSTREAMER LIVE TELEMETRY ──────────────────────────────────
  useEffect(function(){
    let client, sub;
    let retries = 0;
    const maxRetries = 20;

    function tryConnect(){
      // The Lightstreamer Web SDK exposes a global named "Ls" (or sometimes "lightstreamer")
      const Ls = window.Ls || window.lightstreamer;
      if(!Ls || !Ls.LightstreamerClient){
        retries++;
        if(retries < maxRetries){
          setTimeout(tryConnect, 500);
        } else {
          console.warn("[Lightstreamer] global Ls not found after",maxRetries,"retries");
          setLsStatus("library-missing");
        }
        return;
      }

      try {
        console.log("[Lightstreamer] Connecting to push.lightstreamer.com / ISSLIVE...");
        client = new Ls.LightstreamerClient("https://push.lightstreamer.com","ISSLIVE");

        client.addListener({
          onStatusChange: function(status){
            console.log("[Lightstreamer] status:", status);
            if(status.indexOf("CONNECTED") === 0) setLsStatus("online");
            else if(status.indexOf("DISCONNECTED") === 0) setLsStatus("offline");
            else if(status.indexOf("STALLED") === 0) setLsStatus("stalled");
            else setLsStatus("connecting");
          },
          onServerError: function(code, msg){
            console.error("[Lightstreamer] server error:", code, msg);
            setLsStatus("error");
          }
        });

        client.connect();

        const symbols = Object.keys(TELEMETRY);
        console.log("[Lightstreamer] Subscribing to", symbols.length, "symbols");
        sub = new Ls.Subscription("MERGE", symbols, ["TimeStamp","Value"]);
        sub.setRequestedSnapshot("yes");
        sub.setRequestedMaxFrequency(1.0); // 1 update per sec max
        sub.addListener({
          onSubscription: function(){
            console.log("[Lightstreamer] subscribed OK");
          },
          onSubscriptionError: function(code, msg){
            console.error("[Lightstreamer] subscription error:", code, msg);
          },
          onItemUpdate: function(update){
            const itemName = update.getItemName();
            const value = update.getValue("Value");
            const ts = update.getValue("TimeStamp");
            setTelemetry(function(prev){
              return Object.assign({},prev,{[itemName]:{value:value,ts:ts}});
            });
            // Accumulate history for charted symbols
            if(TELEMETRY[itemName] && TELEMETRY[itemName].chart){
              const numV = parseFloat(value);
              if(!isNaN(numV)){
                setHistory(function(prev){
                  const arr = (prev[itemName] || []).concat([{t:Date.now(), v:numV}]);
                  return Object.assign({}, prev, {[itemName]: arr.slice(-60)});
                });
              }
            }
          }
        });
        client.subscribe(sub);
      } catch(e) {
        console.error("[Lightstreamer] init error:",e);
        setLsStatus("error");
      }
    }

    tryConnect();

    return function(){
      try { if(client) client.disconnect(); } catch(e){}
    };
  },[]);

  useEffect(function(){
    fetchISS();
    var i=setInterval(function(){fetchISS();},5000);
    return function(){clearInterval(i);};
  },[fetchISS]);
  useEffect(function(){var i=setInterval(function(){setTime(Date.now());},1000);return function(){clearInterval(i);};},[]);

  const landDots = useMemo(function(){
    var d=[];
    for(var la=-58;la<=74;la+=2)for(var lo=-178;lo<=178;lo+=2)if(isLand(la,lo))d.push({la:la,lo:lo});
    return d;
  },[]);

  // Continuous habitation counter
  const contHab = new Date("2000-11-02T09:21:00Z").getTime();
  const habDays = Math.floor((time - contHab)/86400000);
  const pad=function(n){return String(n).padStart(2,"0");};
  const fmtCoord=function(v,p,n){return v!=null?Math.abs(v).toFixed(4)+"° "+(v>=0?p:n):"---";};

  // Telemetry value helpers
  const tm = function(sym, fallback){
    if(telemetry[sym] && telemetry[sym].value && telemetry[sym].value !== "n/a" && telemetry[sym].value !== "null"){
      return telemetry[sym].value;
    }
    return fallback || "---";
  };
  const tmNum = function(sym, fallback, decimals){
    const v = tm(sym);
    if(v === "---") return fallback || "---";
    const n = parseFloat(v);
    if(isNaN(n)) return fallback || "---";
    return decimals != null ? n.toFixed(decimals) : n.toString();
  };

  // Group symbols by console + group
  const byConsoleGroup = useMemo(function(){
    const result = {};
    Object.keys(TELEMETRY).forEach(function(sym){
      const t = TELEMETRY[sym];
      if(!result[t.console]) result[t.console] = {};
      if(!result[t.console][t.group || "General"]) result[t.console][t.group || "General"] = [];
      result[t.console][t.group || "General"].push(sym);
    });
    return result;
  },[]);

  return (
    <div style={{minHeight:"100vh",color:"#c9d1d9",padding:"0",maxWidth:1500,margin:"0 auto"}}>

      {/* ═══ TOP NAV ═══ */}
      <div style={{borderBottom:"1px solid #21262d",padding:"14px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,background:"#0d1117",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:13}}>
          <a href="https://rmayormartins.github.io" target="_blank" rel="noopener" style={{color:"#58a6ff",fontWeight:500}}>Ramon Mayor Martins</a>
          <span style={{color:"#8b949e"}}>~/station-commander</span>
          <span style={{color:"#30363d"}}>·</span>
          <a href="https://www.ifsc.edu.br" target="_blank" rel="noopener" style={{color:"#8b949e",fontSize:12}}>IFSC</a>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:12,color:"#8b949e"}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:lsStatus==="online"?"#3fb950":"#d29922",animation:"dot 1.8s infinite",display:"inline-block"}}/>
            <span style={{color:lsStatus==="online"?"#3fb950":"#d29922"}}>TM:{lsStatus==="online"?"LIVE":"WAIT"}</span>
          </span>
          <span style={{color:"#30363d"}}>·</span>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:apiStatus==="online"?"#3fb950":"#f0883e",animation:"dot 1.8s infinite",display:"inline-block"}}/>
            <span style={{color:apiStatus==="online"?"#3fb950":"#f0883e"}}>POS:{apiStatus==="online"?"LIVE":"SIM"}</span>
          </span>
          <span style={{color:"#30363d"}}>·</span>
          <span>{new Date(time).toISOString().slice(11,19)} UTC</span>
        </div>
      </div>

      {/* ═══ TITLE ═══ */}
      <div style={{padding:"26px 22px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:14}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:700,color:"#e6edf3",margin:"0 0 8px",letterSpacing:"-0.3px"}}>
              Station Commander — ISS Mission Control
            </h1>
            <p style={{color:"#8b949e",fontSize:13,margin:0,lineHeight:1.5}}>
              {Object.keys(TELEMETRY).length}+ live telemetry points from NASA Lightstreamer ISSLIVE feed · Organized by MCC-H flight controller console
              <span className="caret"/>
            </p>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#8b949e",marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Continuous Habitation</div>
            <div style={{fontSize:22,fontWeight:700,color:"#3fb950",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{habDays.toLocaleString()} days</div>
            <div style={{fontSize:10,color:"#6e7681",marginTop:3}}>since Nov 2, 2000</div>
          </div>
        </div>
      </div>

      {/* ═══ CONTENT WRAPPER ═══ */}
      <div style={{padding:"0 22px 40px"}}>

      {/* ═══ CONSOLE LEGEND BAR ═══ */}
      <div style={{marginBottom:14,padding:"10px 12px",background:"#0f141a",border:"1px solid #21262d",borderRadius:6}}>
        <div style={{fontSize:10,color:"#8b949e",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>
          ▸ Flight Control Team · MCC-H Houston · {Object.keys(telemetry).length}/{Object.keys(TELEMETRY).length} symbols streaming
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.values(CONSOLES).map(function(c){
            const count = Object.keys(TELEMETRY).filter(function(s){return TELEMETRY[s].console===c.name;}).length;

                <span style={{color:c.color}}>{c.icon}</span>

                <span style={{color:"#6e7681"}}>({count})</span>

      </div>

      {/* ═══ TOP ROW: TOPO (mapa) + ETHOS + SPARTAN ═══ */}

        {/* ─── TOPO ─── */}
        <ConsoleCard consoleInfo={CONSOLES.TOPO}>
          <div style={{marginBottom:6,fontSize:10,color:"#8b949e"}}>
            <span style={{color:"#58a6ff"}}>LAT</span> {fmtCoord(iss?iss.latitude:null,"N","S")}
            <span style={{margin:"0 8px",color:"#30363d"}}>·</span>
            <span style={{color:"#58a6ff"}}>LON</span> {fmtCoord(iss?iss.longitude:null,"E","W")}

            <span style={{color:"#58a6ff"}}>VEL</span> {iss?iss.velocity.toFixed(0)+" km/h":"---"}
          </div>
          <div style={{border:"1px solid #21262d",background:"#000",borderRadius:3,overflow:"hidden"}}>
            <svg viewBox="0 0 720 300" style={{width:"100%",display:"block"}}>
              <rect width="720" height="300" fill="#0a0e13"/>

              );})}
              {[-120,-60,0,60,120].map(function(lo){return (

              );})}
              {landDots.map(function(d){return <rect key={d.la+","+d.lo} x={((d.lo+180)/360)*720-0.5} y={((90-d.la)/180)*300-0.5} width="1" height="1" fill="#30363d"/>;})}
              <rect x="0" y={((90-51.64)/180)*300} width="720" height={((90-(-51.64))/180)*300-((90-51.64)/180)*300} fill="#58a6ff08" stroke="none"/>
              {issTrail.map(function(p,i){if(!i)return null;const q=issTrail[i-1];if(Math.abs(p.lon-q.lon)>100)return null;return (
                <line key={"it"+i} x1={((q.lon+180)/360)*720} y1={((90-q.lat)/180)*300} x2={((p.lon+180)/360)*720} y2={((90-p.lat)/180)*300} stroke="#58a6ff" strokeWidth="1.2" opacity={0.15+(i/issTrail.length)*0.7}/>
              );}).filter(Boolean)}
              {iss && (function(){
                const segs=[];
                const inc=51.64;
                const ratio=Math.max(-1,Math.min(1,iss.latitude/inc));
                let phaseFromLat=Math.asin(ratio)/(2*Math.PI);
                if(issTrail.length>=2){
                  const prev=issTrail[issTrail.length-2];
                  if(iss.latitude<prev.lat) phaseFromLat=0.5-phaseFromLat;
                }
                const points=[];
                for(let k=0;k<=50;k++){
                  const tFrac=k/50;
                  const phaseT=(phaseFromLat+tFrac)%1;
                  const lat=inc*Math.sin(phaseT*2*Math.PI);
                  const groundDrift=tFrac*(-22.5);
                  const orbitalLon=(iss.longitude+tFrac*360+groundDrift+540)%360-180;
                  points.push({lat:lat,lon:orbitalLon});
                }
                for(let k=1;k<points.length;k++){
                  const p=points[k],q=points[k-1];
                  if(Math.abs(p.lon-q.lon)>180)continue;
                  segs.push(
                    <line key={"ipred"+k} x1={((q.lon+180)/360)*720} y1={((90-q.lat)/180)*300} x2={((p.lon+180)/360)*720} y2={((90-p.lat)/180)*300} stroke="#58a6ff" strokeWidth="0.8" strokeDasharray="3,3" opacity={0.45-(k/points.length)*0.35}/>
                  );
                }
                return <g>{segs}</g>;

// ═══════════════════════════════════════════════════════════════════════
//  SUB-COMPONENTS
// ═══════════════════════════════════════════════════════════════════════
function ConsoleCard({consoleInfo,children}){
  return (
    <div className="console-card" style={{borderLeft:"3px solid "+consoleInfo.color}}>
      <div className="console-header">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:consoleInfo.color,fontSize:14}}>{consoleInfo.icon}</span>
          <span className="console-tag" style={{color:consoleInfo.color,background:consoleInfo.color+"15",border:"1px solid "+consoleInfo.color+"33"}}>{consoleInfo.name}</span>
          <span style={{color:"#8b949e",fontSize:10}}>{consoleInfo.fullName}</span>
        </div>
      </div>
      {children}
    </div>
  );
}

function KV({l,v,c}){
  return (
    <div style={{padding:"4px 6px",background:"#161b22",border:"1px solid #21262d",borderRadius:3}}>
      <div style={{fontSize:8,color:"#6e7681",letterSpacing:0.5,textTransform:"uppercase"}}>{l}</div>
      <div style={{color:c||"#c9d1d9",fontSize:11,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{v}</div>
    </div>
  );
}

// GroupBlock: collapsible block of telemetry rows
function GroupBlock({title, symbols, tm, tmNum}){
  return (
    <details open style={{marginTop:6}}>
      <summary style={{fontSize:9,color:"#8b949e",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,padding:"3px 0",borderBottom:"1px solid #21262d",cursor:"pointer"}}>
        ▸ {title} <span style={{color:"#6e7681",fontWeight:400}}>({symbols.length})</span>
      </summary>
      <div style={{marginTop:3}}>
        {symbols.map(function(sym){
          const info = TELEMETRY[sym];
          if(!info) return null;
          const raw = tm(sym, "---");
          let display = raw;
          if(raw !== "---" && !isNaN(parseFloat(raw))) {
            const n = parseFloat(raw);
            display = Math.abs(n) >= 100 ? n.toFixed(0) : Math.abs(n) >= 10 ? n.toFixed(1) : n.toFixed(2);
          }
          return (
            <div key={sym} className="tm-row">
              <span className="tm-label" title={sym}>{info.label}</span>
              <span className="tm-val">{display} <span style={{color:"#6e7681",fontSize:9}}>{info.unit}</span></span>
            </div>
          );
        })}
      </div>
    </details>
  );
}

// Sparkline: mini SVG time-series chart
function Sparkline({title, data, color, unit}){
  const points = (data || []).filter(function(p){return !isNaN(p.v);});
  const hasData = points.length >= 2;

  let path = "";
  let areaPath = "";
  let latest = "---";
  let minV = 0, maxV = 0;

  if(hasData){
    const vs = points.map(function(p){return p.v;});
    minV = Math.min.apply(null, vs);
    maxV = Math.max.apply(null, vs);
    const range = (maxV - minV) || 1;
    const w = 260, h = 40;
    const step = w / (points.length - 1);
    path = points.map(function(p,i){
      const x = i*step;
      const y = h - ((p.v - minV)/range) * h;
      return (i===0?"M":"L") + x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ");
    areaPath = path + " L"+w+","+h+" L0,"+h+" Z";
    latest = points[points.length-1].v.toFixed(2);
  }

  return (
    <div className="sparkline-box">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
        <span style={{fontSize:9,color:"#8b949e",textTransform:"uppercase",letterSpacing:0.5}}>{title}</span>
        <span style={{fontSize:11,color:color,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>
          {latest} <span style={{color:"#6e7681",fontSize:9}}>{unit}</span>
        </span>
      </div>
      <svg viewBox="0 0 260 40" style={{width:"100%",height:36,display:"block"}}>
        <defs>
          <linearGradient id={"grad-"+title.replace(/[^a-z0-9]/gi,"")} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0.25,0.5,0.75].map(function(f){return (
          <line key={f} x1="0" y1={40*f} x2="260" y2={40*f} stroke="#21262d" strokeWidth="0.5" strokeDasharray="2,3"/>
        );})}
        {hasData ? (
          <g>
            <path d={areaPath} fill={"url(#grad-"+title.replace(/[^a-z0-9]/gi,"")+")"}/>
            <path d={path} stroke={color} strokeWidth="1.5" fill="none"/>
            <circle cx={260} cy={40 - ((points[points.length-1].v - minV)/((maxV-minV)||1))*40} r="2" fill={color}/>
          </g>
        ) : (
          <text x="130" y="24" fill="#6e7681" fontSize="9" textAnchor="middle" fontFamily="monospace">waiting for data...</text>
        )}
      </svg>
      {hasData && (
        <div style={{fontSize:8,color:"#6e7681",display:"flex",justifyContent:"space-between",marginTop:2}}>
          <span>min {minV.toFixed(2)}</span>
          <span>{points.length} pts</span>
          <span>max {maxV.toFixed(2)}</span>
        </div>
      )}
    </div>
  );
}
