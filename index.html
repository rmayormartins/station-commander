const STATIONS = {

    ],
    ops:[["Expedition","74 (since Sep 2025)"],["Ground Control","MCC-H Houston \u00b7 TsUP Moscow \u00b7 Col-CC Munich \u00b7 SSIPC Tsukuba"],["Reboost","Progress MS thrusters ~monthly"],["EVA Suits","US EMU \u00b7 Orlan-MKS"],["O\u2082 Generation","OGS electrolysis + Elektron"],["CO\u2082 Removal","CDRA (US) + Vozdukh (RU)"],["Water Recovery","WRS \u2014 93% recycle rate"],["Canadarm2","17.6m, 7-DOF robotic arm"],["Crew Exercise","ARED, T2 treadmill, CEVIS"]],

    ],
    ops:[["Mission","Shenzhou 21 (since Nov 2025)"],["Ground Control","Beijing BACC"],["EVA Suits","Feitian Gen-2 (new 2025)"],["Relay Sats","Tianlian-1/2 constellation"],["Active Research","27 experiments in-progress"],["Animal Study","4 mice \u2014 first for China"],["Reboost","Tianzhou cargo thrusters"],["Life Support","Regenerative ECLSS"],["Robotic Arm","10m 7-DOF (Wentian)"]],
  },

const NEWS = [
  {t:"2026-04-01 18:24",s:"NASA",h:"Artemis II launches from KSC Pad 39B \u2014 first crewed lunar mission since Apollo 17 in 1972"},
  {t:"2026-04-01 11:41",s:"NASA Blog",h:"Expedition 74 crew trains Canadarm2 robotics for Cygnus XL cargo capture operation"},

  {t:"2026-03-10",s:"NASASpaceFlight",h:"ISS Feb roundup: Crew-12 arrival, Crew-11 early return after medical event, CRS-33 departure"},
  {t:"2026-02-14",s:"SpaceX",h:"Crew-12 Dragon Freedom docks with ISS at Harmony port on Valentine's Day"},
  {t:"2026-02-13",s:"NASA",h:"Crew-12 launches: Meir, Hathaway, Adenot & Fedyaev head to ISS from SLC-40"},
  {t:"2025-11-25",s:"CMSA",h:"Shenzhou 22 launches as rescue vehicle after Shenzhou 20 window damage incident"},
  {t:"2025-11-01",s:"CMSA",h:"Shenzhou 21 crew arrives at Tiangong \u2014 Zhang Lu, Wu Fei, Zhang Hongzhang begin 6-month stay"},
  {t:"2025-10-31",s:"Xinhua",h:"China launches youngest astronaut Wu Fei \u2014 first animal study with 4 mice onboard station"},
];

function simulateOrbit(t, inc, perMin, phase) {
  phase = phase || 0;
  var perMs = perMin*60*1000;
  var frac = ((t+phase)%perMs)/perMs;
  var rawLon = (frac*360+180)%360 - 180;
  var earthRot = ((t/60000)*0.25)%360;
  var lon = ((rawLon - earthRot + 540) % 360) - 180;
  var lat = inc * Math.sin(frac*2*Math.PI);
  return {latitude:lat, longitude:lon};
}

function OrbitalCommand() {
  const [iss, setIss] = useState(null);
  const [tg, setTg] = useState(null);
  const [time, setTime] = useState(Date.now());
  const [sel, setSel] = useState("iss");
  const [tab, setTab] = useState("map");
  const [issTrail, setIssTrail] = useState([]);
  const [tgTrail, setTgTrail] = useState([]);
  const canvasRef = useRef(null);
  const [globeRot, setGlobeRot] = useState(0);

  const fetchISS = useCallback(function() {
    fetch("https://api.wheretheiss.at/v1/satellites/25544")
      .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
      .then(function(d){
        setIss(Object.assign({},d,{live:true}));
        setIssTrail(function(p){return p.slice(-250).concat([{lat:d.latitude,lon:d.longitude}]);});
      })
      .catch(function(){
        var s=simulateOrbit(Date.now(),51.6,92.68,0);
        var d={latitude:s.latitude,longitude:s.longitude,altitude:408+Math.random()*5,velocity:27580+Math.random()*40,visibility:"daylight",live:false};
        setIss(d);setIssTrail(function(p){return p.slice(-250).concat([{lat:d.latitude,lon:d.longitude}]);});
      });
  },[]);

  const updateTG = useCallback(function(){
    var s=simulateOrbit(Date.now(),41.5,91.4,4800000);
    var d={latitude:s.latitude,longitude:s.longitude,altitude:388+Math.random()*8,velocity:27640+Math.random()*30,visibility:Math.random()>0.4?"daylight":"eclipsed",live:false};
    setTg(d);setTgTrail(function(p){return p.slice(-250).concat([{lat:d.latitude,lon:d.longitude}]);});
  },[]);

  useEffect(function(){fetchISS();updateTG();var i=setInterval(function(){fetchISS();updateTG();},4000);return function(){clearInterval(i);};},[fetchISS,updateTG]);
  useEffect(function(){var i=setInterval(function(){setTime(Date.now());},1000);return function(){clearInterval(i);};},[]);
  useEffect(function(){var i=setInterval(function(){setGlobeRot(function(r){return r+0.25;});},50);return function(){clearInterval(i);};},[]);

  // Globe
  useEffect(function(){
    var cv=canvasRef.current;if(!cv)return;
    var ctx=cv.getContext("2d"),w=cv.width,h=cv.height,cx=w/2,cy=h/2,R=Math.min(w,h)/2-8;
    ctx.clearRect(0,0,w,h);
    var bg=ctx.createRadialGradient(cx-R*.15,cy-R*.15,R*.05,cx,cy,R);
    bg.addColorStop(0,"#0d1a0d");bg.addColorStop(1,"#040804");
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
    ctx.strokeStyle="#00ff4118";ctx.lineWidth=1;ctx.stroke();
    ctx.strokeStyle="#00ff410c";ctx.lineWidth=.4;
    for(var la=-60;la<=60;la+=30){var lr=la*Math.PI/180,yp=cy-R*Math.sin(lr),xr=R*Math.cos(lr);if(xr>0){ctx.beginPath();ctx.ellipse(cx,yp,xr,xr*.12,0,0,Math.PI*2);ctx.stroke();}}
    for(var lo=-180;lo<180;lo+=30){var lr2=(lo+globeRot)*Math.PI/180;ctx.beginPath();for(var la2=-90;la2<=90;la2+=2){var lar=la2*Math.PI/180,px=cx+R*Math.cos(lar)*Math.sin(lr2),py=cy-R*Math.sin(lar),z=Math.cos(lar)*Math.cos(lr2);if(z>0){la2===-90?ctx.moveTo(px,py):ctx.lineTo(px,py);}}ctx.stroke();}
    for(var la3=-60;la3<=70;la3+=2.5)for(var lo2=-175;lo2<=175;lo2+=2.5){if(!isLand(la3,lo2))continue;var lar2=la3*Math.PI/180,lor=(lo2+globeRot)*Math.PI/180,x=Math.cos(lar2)*Math.sin(lor),y=-Math.sin(lar2),z2=Math.cos(lar2)*Math.cos(lor);if(z2>0){ctx.fillStyle="rgba(0,255,65,"+(0.12+z2*0.22)+")";ctx.fillRect(cx+R*x-1,cy+R*y-1,2,2);}}
    var drawSt=function(d,col,lbl){if(!d)return;var lar3=d.latitude*Math.PI/180,lor2=(d.longitude+globeRot)*Math.PI/180,x2=Math.cos(lar3)*Math.sin(lor2),y2=-Math.sin(lar3),z3=Math.cos(lar3)*Math.cos(lor2);if(z3>0){var px2=cx+R*x2,py2=cy+R*y2;var g=ctx.createRadialGradient(px2,py2,0,px2,py2,14);g.addColorStop(0,col);g.addColorStop(1,"transparent");ctx.fillStyle=g;ctx.fillRect(px2-14,py2-14,28,28);ctx.beginPath();ctx.arc(px2,py2,3.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.fillStyle=col;ctx.font="bold 10px monospace";ctx.fillText(lbl,px2+8,py2-8);}};
    drawSt(iss,"#00ff41","ISS");drawSt(tg,"#ff6b35","\u5929\u5BAB");
  },[globeRot,iss,tg]);

  var st = STATIONS[sel], data = sel==="iss"?iss:tg;
  var elapsed=function(d){var df=time-new Date(d).getTime(),dy=Math.floor(df/864e5),hr=Math.floor((df%864e5)/36e5),mn=Math.floor((df%36e5)/6e4),sc=Math.floor((df%6e4)/1e3);return{dy:dy,hr:hr,mn:mn,sc:sc};};
  var curE = elapsed(st.launched);
  var lonToX=function(lon,w){return((lon+180)/360)*w;};
  var latToY=function(lat,h){return((90-lat)/180)*h;};
  var fC=function(v,p,n){return v!=null?Math.abs(v).toFixed(4)+"\u00b0 "+(v>=0?p:n):"---";};
  var pad2=function(n){return String(n).padStart(2,"0");};

  // Pre-generate land dots for map
  var landDots = [];
  for(var la=-55;la<=72;la+=1.8)for(var lo=-175;lo<=175;lo+=1.8)if(isLand(la,lo))landDots.push({la:la,lo:lo});

  return (
    <div style={S.root}>
      <div style={S.scan}/>

      {/* HEADER */}
      <header style={S.hdr}>
        <div style={S.hdrL}>
          <span style={{color:"#00ff41",fontSize:20,fontWeight:900}}>{"\u25C8"}</span>
          <div><div style={S.title}>ORBITAL COMMAND</div><div style={S.sub}>DUAL STATION REAL-TIME TRACKER {"\u00b7"} ISS + TIANGONG</div></div>
        </div>
        <div style={S.hdrC}>
          <span style={{color:"#00ff4155",fontSize:8}}>UTC</span>{" "}
          <span style={{color:"#00ff41",fontWeight:700,fontSize:14,letterSpacing:2}}>{new Date(time).toISOString().slice(11,19)}</span>
          <div style={{color:"#00ff4133",fontSize:8}}>{new Date(time).toISOString().slice(0,10)}</div>
        </div>
        <div style={S.hdrR}>
          <div style={S.liveD}/><span style={{color:"#00ff41",fontSize:8,letterSpacing:2}}>TRACKING</span>
          <div style={{marginLeft:10,fontSize:10,fontWeight:700}}>
            <span style={{color:"#00ff41"}}>7</span><span style={{color:"#333"}}> + </span>
            <span style={{color:"#ff6b35"}}>3</span><span style={{color:"#333"}}> = </span>
            <span style={{color:"#fff"}}>10</span>
            <span style={{color:"#444",fontSize:7,marginLeft:3}}>IN ORBIT</span>
          </div>
        </div>
      </header>

      {/* SELECTOR */}
      <div style={S.selBar}>
        {["iss","tiangong"].map(function(k){var s=STATIONS[k];return(
          <button key={k} onClick={function(){setSel(k);}} style={Object.assign({},S.selBtn,{borderColor:sel===k?s.c:s.c+"22",background:sel===k?s.c+"12":"transparent",color:sel===k?s.c:s.c+"55"})}>
            <span style={{animation:"blink 1.5s infinite",fontSize:6,marginRight:3}}>{"\u25CF"}</span>
            {s.name} {"\u2014"} {k==="iss"?"Expedition 74":"Shenzhou 21"}
          </button>
        );})}
        {iss && iss.live && <span style={{marginLeft:"auto",color:"#00ff41",fontSize:7,animation:"blink 2s infinite"}}>{"\u25CF"} LIVE API DATA</span>}
        {iss && !iss.live && <span style={{marginLeft:"auto",color:"#ff6b35",fontSize:7}}>{"\u25CC"} SIMULATED</span>}
      </div>

      {/* TOP: TELEMETRY + MAP */}
      <div style={S.topRow}>
        <div style={S.telSide}>
          <Box c={st.c} t={st.name+" POSITION"}>
            <TV l="LAT" v={fC(data?data.latitude:null,"N","S")} c={st.c}/>
            <TV l="LON" v={fC(data?data.longitude:null,"E","W")} c={st.c}/>
            <TV l="ALT" v={data?data.altitude.toFixed(1)+" km":"---"} c={st.c}/>
            <TV l="VELOCITY" v={data?data.velocity.toFixed(0)+" km/h":"---"} c={st.c}/>
          </Box>
          <Box c={st.c} t="ORBITAL ELEMENTS">
            {[["INCL",st.inclination],["PERIOD",st.period],["APOGEE",st.apogee],["PERIGEE",st.perigee],["ORB/DAY","~15.5"],["NORAD",String(st.noradId)]].map(function(x){return <TV key={x[0]} l={x[0]} v={x[1]} c={st.c}/>;})}
          </Box>
          <Box c={st.c} t="MISSION ELAPSED TIME">
            <div style={S.met}>
              <MD v={curE.dy} l="DAYS" c={st.c}/><span style={{color:st.c+"66",fontSize:14}}>:</span>
              <MD v={pad2(curE.hr)} l="HR" c={st.c}/><span style={{color:st.c+"66",fontSize:14}}>:</span>
              <MD v={pad2(curE.mn)} l="MN" c={st.c}/><span style={{color:st.c+"66",fontSize:14}}>:</span>
              <MD v={pad2(curE.sc)} l="SC" c={st.c}/>
            </div>
            <div style={{color:"#444",fontSize:7,textAlign:"center"}}>Since {st.launchLabel}</div>
          </Box>
        </div>

        <div style={S.mapArea}>
          <div style={S.tabs}>
            {[["map","\u25FB GROUND TRACK"],["globe","\u25C9 3D GLOBE"]].map(function(x){return(
              <button key={x[0]} onClick={function(){setTab(x[0]);}} style={Object.assign({},S.tabBtn,tab===x[0]?S.tabAct:{})}>{x[1]}</button>
            );})}
          </div>
          {tab==="map"?(
            <div style={S.mapBox}>
              <svg viewBox="0 0 720 360" style={{width:"100%",display:"block"}}>
                <defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#00ff4106" strokeWidth=".3"/></pattern></defs>
                <rect width="720" height="360" fill="#040804"/><rect width="720" height="360" fill="url(#g)"/>
                {[-60,-30,0,30,60].map(function(la){return <g key={la}><line x1={0} y1={latToY(la,360)} x2={720} y2={latToY(la,360)} stroke="#00ff4108" strokeWidth=".3"/><text x={2} y={latToY(la,360)-1} fill="#00ff4120" fontSize="5" fontFamily="monospace">{la+"\u00b0"}</text></g>;})}
                {[-150,-120,-90,-60,-30,0,30,60,90,120,150].map(function(lo){return <line key={lo} x1={lonToX(lo,720)} y1={0} x2={lonToX(lo,720)} y2={360} stroke="#00ff4108" strokeWidth=".3"/>;})}
                {landDots.map(function(d){return <rect key={d.la+","+d.lo} x={lonToX(d.lo,720)-.6} y={latToY(d.la,360)-.6} width={1.2} height={1.2} fill="#00ff4116"/>;})}
                <rect x={0} y={latToY(51.6,360)} width={720} height={latToY(-51.6,360)-latToY(51.6,360)} fill="#00ff4104"/>
                <rect x={0} y={latToY(41.5,360)} width={720} height={latToY(-41.5,360)-latToY(41.5,360)} fill="#ff6b3504"/>
                {issTrail.map(function(p,i){if(!i)return null;var q=issTrail[i-1];if(Math.abs(p.lon-q.lon)>100)return null;return <line key={"i"+i} x1={lonToX(q.lon,720)} y1={latToY(q.lat,360)} x2={lonToX(p.lon,720)} y2={latToY(p.lat,360)} stroke="#00ff41" strokeWidth=".8" opacity={.15+i/issTrail.length*.5}/>;}).filter(Boolean)}

            <rect x={312} y={58} width={48} height={32} fill="#00ff4115" stroke="#00ff4160" rx={2}/><text x={336} y={74} fill="#00ff41" fontSize="6.5" textAnchor="middle" fontWeight="bold" fontFamily="monospace">UNITY</text><text x={336} y={84} fill="#00ff4144" fontSize="4.5" textAnchor="middle" fontFamily="monospace">Node 1</text>

              <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:st.c,fontWeight:700,fontSize:9}}>{c.band}</span><span style={{color:st.c+"88",fontSize:8}}>{c.freq}</span></div>
              <div style={{color:"#555",fontSize:7,marginTop:1}}>{c.use}</div>

          </Box>
          <Box c={st.c} t={st.name+" OPERATIONS"}>
            {st.ops.map(function(x){return <SR key={x[0]} l={x[0]} v={x[1]} c="#999"/>;})}

        <div style={S.bCol}>
          <Box c="#00ff41" t={"ISS CREW \u2014 Expedition 74 ("+STATIONS.iss.crew.length+")"}>

          <Box c="#ff6b35" t={"TIANGONG \u2014 Shenzhou 21 ("+STATIONS.tiangong.crew.length+")"}>

              <div style={{color:"#ff6b35",fontWeight:700,fontSize:9}}>{c.flag} {c.name}</div>

            </div>;})}

          <Box c="#00ff41" t="ISS vs TIANGONG">

              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3,padding:"2px 3px",background:!i?"#ffffff06":"transparent",borderBottom:"1px solid #ffffff05"}}>
                <span style={{color:!i?"#fff":"#555",fontSize:!i?8:7,fontWeight:!i?700:400}}>{r[0]}</span>

              {NEWS.map(function(n,i){return <div key={i} style={{padding:"4px 5px",background:"#04070499",borderLeft:"2px solid #ffb00030"}}>
                <div style={{color:"#ffb00066",fontSize:7}}>{n.t+" \u00b7 "+n.s}</div>
                <div style={{color:"#bbb",fontSize:8,marginTop:1,lineHeight:1.3}}>{n.h}</div>

      </div>

      <footer style={S.footer}>
        <span>ORBITAL COMMAND v3.1</span><span style={{color:"#222"}}>{"\u00b7"}</span>
        <span>ISS data: wheretheiss.at</span><span style={{color:"#222"}}>{"\u00b7"}</span>
        <span>Tiangong: simulated</span><span style={{color:"#222"}}>{"\u00b7"}</span>
        <span>Crew: NASA/CMSA Apr 2026</span><span style={{color:"#222"}}>{"\u00b7"}</span>
        <span>Updates 4s</span>
      </footer>
    </div>
  );
}

function Box(props){return <div style={{border:"1px solid "+props.c+"28",background:"#090d09",padding:"8px 9px"}}><div style={{color:props.c,fontSize:8,fontWeight:700,letterSpacing:1.8,marginBottom:6,paddingBottom:4,borderBottom:"1px solid #ffffff06"}}>{"\u25B8 "+props.t}</div>{props.children}</div>;}
function TV(props){return <div style={{padding:"3px 5px",background:"#04070499",border:"1px solid #ffffff05",marginBottom:2}}><div style={{color:"#555",fontSize:6.5,letterSpacing:1.2}}>{props.l}</div><div style={{color:props.c,fontSize:10,fontWeight:700}}>{props.v}</div></div>;}
function MD(props){return <div style={{textAlign:"center"}}><div style={{color:props.c,fontSize:16,fontWeight:800,fontVariantNumeric:"tabular-nums"}}>{props.v}</div><div style={{color:props.c+"44",fontSize:6,letterSpacing:1.5}}>{props.l}</div></div>;}
function SR(props){return <div style={S.sr}><span style={{color:"#555"}}>{props.l}</span><span style={{color:props.c||"#00ff41",fontWeight:600,textAlign:"right",maxWidth:"62%"}}>{props.v}</span></div>;}

var S={

  scan:{position:"fixed",inset:0,background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 4px)",pointerEvents:"none",zIndex:9999},
  hdr:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderBottom:"1px solid #00ff4115",background:"linear-gradient(180deg,#0a0f0a,#070a07)",flexWrap:"wrap",gap:6},

  title:{color:"#00ff41",fontSize:14,fontWeight:900,letterSpacing:4},sub:{color:"#00ff4138",fontSize:6.5,letterSpacing:2},
  liveD:{width:5,height:5,borderRadius:"50%",background:"#00ff41",boxShadow:"0 0 6px #00ff41",animation:"blink 2s infinite"},
  selBar:{display:"flex",alignItems:"center",gap:5,padding:"5px 14px",borderBottom:"1px solid #00ff410e",flexWrap:"wrap"},

  mapArea:{display:"flex",flexDirection:"column",minWidth:0},

  tabAct:{background:"#040804",color:"#00ff41",borderColor:"#00ff4140"},
  mapBox:{border:"1px solid #00ff4118",borderTop:"none",background:"#040804",overflow:"hidden",aspectRatio:"2/1"},
  globeBox:{border:"1px solid #00ff4118",borderTop:"none",background:"#040804",display:"flex",justifyContent:"center",padding:6,aspectRatio:"2/1"},
