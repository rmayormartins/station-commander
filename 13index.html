<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Commander — ISS Mission Control Dashboard</title>
<meta name="description" content="Real-time ISS mission control dashboard organized by flight console (TOPO, ETHOS, SPARTAN, ADCO, VVO, CAPCOM, INCO). Live NASA telemetry via Lightstreamer.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#21262d;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#30363d}
  html,body{
    background:#0d1117;
    font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    color:#c9d1d9;
    min-height:100vh;
    font-size:13px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body{overflow-x:hidden}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes dot{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  #root{min-height:100vh}
  .btn{cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s}
  .caret{display:inline-block;width:8px;height:14px;background:#58a6ff;animation:blink 1.1s infinite;vertical-align:middle;margin-left:2px}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  .console-card{
    border:1px solid #21262d;
    background:#0f141a;
    border-radius:6px;
    padding:14px 16px;
    transition:border-color .2s;
  }
  .console-card:hover{border-color:#30363d}
  .console-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid #21262d;
  }
  .console-tag{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.5px;
    padding:2px 7px;
    border-radius:3px;
    text-transform:uppercase;
  }
  .status-nom{color:#3fb950}
  .status-cau{color:#d29922}
  .status-crit{color:#f85149}
  .metric-value{
    font-variant-numeric:tabular-nums;
    font-weight:600;
  }
  .progress-track{
    height:5px;
    background:#21262d;
    border-radius:3px;
    overflow:hidden;
    margin-top:5px;
  }
  .progress-fill{
    height:100%;
    border-radius:3px;
    transition:width .5s ease-out;
  }
  details{cursor:pointer}
  summary{list-style:none;outline:none}
  summary::-webkit-details-marker{display:none}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  {latMin:20,latMax:42,lonMin:65,lonMax:125},{latMin:5,latMax:20,lonMin:68,lonMax:92},
  {latMin:-10,latMax:20,lonMin:95,lonMax:140},{latMin:30,latMax:42,lonMin:125,lonMax:145},
  {latMin:12,latMax:38,lonMin:32,lonMax:62},{latMin:-40,latMax:-12,lonMin:114,lonMax:153},

  {latMin:5,latMax:20,lonMin:117,lonMax:127},
];
const isLand = (lat,lon) => LAND_REGIONS.some(r => lat>=r.latMin && lat<=r.latMax && lon>=r.lonMin && lon<=r.lonMax);

function simulateOrbit(t, inc, perMin, phase) {
  phase = phase || 0;
  var perMs = perMin*60*1000;
  var frac = ((t+phase)%perMs)/perMs;
  var rawLon = (frac*360+180)%360 - 180;
  var earthRot = ((t/60000)*0.25)%360;
  var lon = ((rawLon - earthRot + 540) % 360) - 180;
  var lat = inc * Math.sin(frac*2*Math.PI);
  return {latitude:lat, longitude:lon};
}

// ═══════════════════════════════════════════════════════════════════════
//  MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════════
function StationCommander() {
  const [iss, setIss] = useState(null);
  const [time, setTime] = useState(Date.now());
  const [issTrail, setIssTrail] = useState([]);
  const [apiStatus, setApiStatus] = useState("connecting");
  const [telemetry, setTelemetry] = useState({});
  const [lsStatus, setLsStatus] = useState("connecting");
  const lsClientRef = useRef(null);

  // ─── ISS POSITION (wheretheiss.at) ─────────────────────────────────
  const fetchISS = useCallback(function(){
    fetch("https://api.wheretheiss.at/v1/satellites/25544")
      .then(function(r){if(!r.ok)throw new Error();return r.json();})
      .then(function(d){
        setIss(Object.assign({},d,{live:true}));
        setApiStatus("online");
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      })
      .catch(function(){
        setApiStatus("offline");
        var s=simulateOrbit(Date.now(),51.64,92.68,0);
        var d={latitude:s.latitude,longitude:s.longitude,altitude:408+Math.random()*5,velocity:27580+Math.random()*40,visibility:Math.random()>0.4?"daylight":"eclipsed",live:false};
        setIss(d);
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      });
  },[]);

  // ─── LIGHTSTREAMER LIVE TELEMETRY ──────────────────────────────────
  useEffect(function(){
    if(typeof lightstreamer === "undefined"){
      setLsStatus("library-missing");
      return;
    }
    try {
      const client = new lightstreamer.LightstreamerClient("https://push.lightstreamer.com","ISSLIVE");
      lsClientRef.current = client;

      client.addListener({
        onStatusChange:function(status){
          if(status.indexOf("CONNECTED")===0) setLsStatus("online");
          else if(status.indexOf("DISCONNECTED")===0) setLsStatus("offline");
          else setLsStatus("connecting");
        }
      });

      client.connect();

      const symbols = Object.keys(TELEMETRY);
      const sub = new lightstreamer.Subscription("MERGE", symbols, ["TimeStamp","Value"]);
      sub.setRequestedSnapshot("yes");
      sub.addListener({
        onItemUpdate:function(update){
          const itemName = update.getItemName();
          const value = update.getValue("Value");
          const ts = update.getValue("TimeStamp");
          setTelemetry(function(prev){
            return Object.assign({},prev,{[itemName]:{value:value,ts:ts}});
          });
        }
      });
      client.subscribe(sub);

      return function(){
        try { client.disconnect(); } catch(e){}
      };
    } catch(e) {
      console.error("Lightstreamer error:",e);
      setLsStatus("error");
    }
  },[]);

  useEffect(function(){
    fetchISS();
    var i=setInterval(function(){fetchISS();},5000);
    return function(){clearInterval(i);};
  },[fetchISS]);
  useEffect(function(){var i=setInterval(function(){setTime(Date.now());},1000);return function(){clearInterval(i);};},[]);

  const landDots = useMemo(function(){
    var d=[];
    for(var la=-58;la<=74;la+=2)for(var lo=-178;lo<=178;lo+=2)if(isLand(la,lo))d.push({la:la,lo:lo});
    return d;
  },[]);

  // Elapsed since ISS continuous habitation (Nov 2, 2000)
  const contHab = new Date("2000-11-02T09:21:00Z").getTime();
  const dfHab = time - contHab;
  const habDays = Math.floor(dfHab/86400000);

  const pad=function(n){return String(n).padStart(2,"0");};
  const fmtCoord=function(v,p,n){return v!=null?Math.abs(v).toFixed(4)+"\u00b0 "+(v>=0?p:n):"---";};

  // Get telemetry value helper
  const tm = function(sym,fallback){
    if(telemetry[sym] && telemetry[sym].value && telemetry[sym].value !== "n/a"){
      return telemetry[sym].value;
    }
    return fallback || "---";
  };
  const tmNum = function(sym,fallback,decimals){
    const v = tm(sym);
    if(v === "---") return fallback||"---";
    const n = parseFloat(v);
    if(isNaN(n)) return fallback||"---";
    return decimals!=null ? n.toFixed(decimals) : n.toString();
  };

  // ─── DERIVED METRICS (fallback values when LS is offline) ─────────
  const hasLive = lsStatus === "online" && Object.keys(telemetry).length > 0;

  return (
    <div style={{minHeight:"100vh",color:"#c9d1d9",padding:"0",maxWidth:1500,margin:"0 auto"}}>

      {/* ═══ TOP NAV ═══ */}
      <div style={{borderBottom:"1px solid #21262d",padding:"14px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,background:"#0d1117",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:13}}>
          <a href="https://rmayormartins.github.io" target="_blank" rel="noopener" style={{color:"#58a6ff",fontWeight:500}}>Ramon Mayor Martins</a>
          <span style={{color:"#8b949e"}}>~/station-commander</span>
          <span style={{color:"#30363d"}}>·</span>
          <a href="https://www.ifsc.edu.br" target="_blank" rel="noopener" style={{color:"#8b949e",fontSize:12}}>IFSC</a>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:12,color:"#8b949e"}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:lsStatus==="online"?"#3fb950":"#d29922",animation:"dot 1.8s infinite",display:"inline-block"}}/>
            <span style={{color:lsStatus==="online"?"#3fb950":"#d29922"}}>
              LS:{lsStatus==="online"?"LIVE":"WAIT"}
            </span>
          </span>
          <span style={{color:"#30363d"}}>·</span>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:apiStatus==="online"?"#3fb950":"#f0883e",animation:"dot 1.8s infinite",display:"inline-block"}}/>
            <span style={{color:apiStatus==="online"?"#3fb950":"#f0883e"}}>POS:{apiStatus==="online"?"LIVE":"SIM"}</span>
          </span>
          <span style={{color:"#30363d"}}>·</span>
          <span>{new Date(time).toISOString().slice(11,19)} UTC</span>
        </div>
      </div>

      {/* ═══ TITLE ═══ */}
      <div style={{padding:"26px 22px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:14}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:700,color:"#e6edf3",margin:"0 0 8px",letterSpacing:"-0.3px"}}>
              Station Commander — ISS Mission Control
            </h1>
            <p style={{color:"#8b949e",fontSize:13,margin:0,lineHeight:1.5}}>
              Live flight console dashboard · NASA MCC-H Houston layout · Real ISS telemetry via Lightstreamer
              <span className="caret"/>
            </p>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#8b949e",marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Continuous Habitation</div>
            <div style={{fontSize:22,fontWeight:700,color:"#3fb950",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{habDays.toLocaleString()} days</div>
            <div style={{fontSize:10,color:"#6e7681",marginTop:3}}>since Nov 2, 2000</div>
          </div>
        </div>
      </div>

      {/* ═══ CONTENT WRAPPER ═══ */}
      <div style={{padding:"0 22px 40px"}}>

      {/* ═══ CONSOLE LEGEND BAR ═══ */}
      <div style={{marginBottom:18,padding:"10px 14px",background:"#0f141a",border:"1px solid #21262d",borderRadius:6}}>
        <div style={{fontSize:10,color:"#8b949e",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>▸ Flight Control Team — MCC-H Houston</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {Object.values(CONSOLES).map(function(c){return (
            <div key={c.name} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",border:"1px solid "+c.color+"33",background:c.color+"0c",borderRadius:4}}>
              <span style={{color:c.color,fontSize:12}}>{c.icon}</span>
              <span style={{color:c.color,fontWeight:700,fontSize:11,letterSpacing:0.5}}>{c.name}</span>
              <span style={{color:"#8b949e",fontSize:10}}>{c.fullName}</span>
            </div>
          );})}
        </div>
      </div>

      {/* ═══ TOP ROW: TOPO (mapa compacto) + ETHOS + SPARTAN ═══ */}
      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr",gap:10,marginBottom:12}}>

        {/* ─── TOPO — Trajectory ─── */}
        <ConsoleCard console={CONSOLES.TOPO}>
          <div style={{marginBottom:8,fontSize:10,color:"#8b949e"}}>
            <span style={{color:"#58a6ff"}}>LAT</span> {fmtCoord(iss?iss.latitude:null,"N","S")}
            <span style={{margin:"0 8px",color:"#30363d"}}>·</span>
            <span style={{color:"#58a6ff"}}>LON</span> {fmtCoord(iss?iss.longitude:null,"E","W")}
            <span style={{margin:"0 8px",color:"#30363d"}}>·</span>
            <span style={{color:"#58a6ff"}}>ALT</span> {iss?iss.altitude.toFixed(1)+" km":"---"}
            <span style={{margin:"0 8px",color:"#30363d"}}>·</span>
            <span style={{color:"#58a6ff"}}>VEL</span> {iss?iss.velocity.toFixed(0)+" km/h":"---"}
          </div>
          <div style={{border:"1px solid #21262d",background:"#000",borderRadius:3,overflow:"hidden"}}>
            <svg viewBox="0 0 720 300" style={{width:"100%",display:"block"}}>
              <rect width="720" height="300" fill="#0a0e13"/>
              {[-60,-30,0,30,60].map(function(la){return (
                <line key={"la"+la} x1="0" y1={((90-la)/180)*300} x2="720" y2={((90-la)/180)*300} stroke="#21262d" strokeWidth="0.4" strokeDasharray={la===0?"none":"3,4"}/>
              );})}
              {[-120,-60,0,60,120].map(function(lo){return (
                <line key={"lo"+lo} x1={((lo+180)/360)*720} y1="0" x2={((lo+180)/360)*720} y2="300" stroke="#21262d" strokeWidth="0.4" strokeDasharray={lo===0?"none":"3,4"}/>
              );})}
              {landDots.map(function(d){return <rect key={d.la+","+d.lo} x={((d.lo+180)/360)*720-0.5} y={((90-d.la)/180)*300-0.5} width="1" height="1" fill="#30363d"/>;})}

              {/* Inclination band */}
              <rect x="0" y={((90-51.64)/180)*300} width="720" height={((90-(-51.64))/180)*300-((90-51.64)/180)*300} fill="#58a6ff08" stroke="none"/>

              {/* Trail */}
              {issTrail.map(function(p,i){if(!i)return null;const q=issTrail[i-1];if(Math.abs(p.lon-q.lon)>100)return null;return (
                <line key={"it"+i} x1={((q.lon+180)/360)*720} y1={((90-q.lat)/180)*300} x2={((p.lon+180)/360)*720} y2={((90-p.lat)/180)*300} stroke="#58a6ff" strokeWidth="1.2" opacity={0.15+(i/issTrail.length)*0.7}/>
              );}).filter(Boolean)}

              {/* Predicted trajectory */}
              {iss && (function(){
                const segs=[];
                const inc=51.64;
                const ratio=Math.max(-1,Math.min(1,iss.latitude/inc));
                let phaseFromLat=Math.asin(ratio)/(2*Math.PI);
                if(issTrail.length>=2){
                  const prev=issTrail[issTrail.length-2];
                  if(iss.latitude<prev.lat) phaseFromLat=0.5-phaseFromLat;
                }
                const points=[];
                for(let k=0;k<=50;k++){
                  const tFrac=k/50;
                  const phaseT=(phaseFromLat+tFrac)%1;
                  const lat=inc*Math.sin(phaseT*2*Math.PI);
                  const groundDrift=tFrac*(-22.5);
                  const orbitalLon=(iss.longitude+tFrac*360+groundDrift+540)%360-180;
                  points.push({lat:lat,lon:orbitalLon});
                }
                for(let k=1;k<points.length;k++){
                  const p=points[k],q=points[k-1];
                  if(Math.abs(p.lon-q.lon)>180)continue;
                  segs.push(
                    <line key={"ipred"+k} x1={((q.lon+180)/360)*720} y1={((90-q.lat)/180)*300} x2={((p.lon+180)/360)*720} y2={((90-p.lat)/180)*300} stroke="#58a6ff" strokeWidth="0.8" strokeDasharray="3,3" opacity={0.45-(k/points.length)*0.35}/>
                  );
                }
                return <g>{segs}</g>;
              })()}

              {iss && (
                <g>
                  <circle cx={((iss.longitude+180)/360)*720} cy={((90-iss.latitude)/180)*300} r="16" fill="#58a6ff22">
                    <animate attributeName="r" values="10;20;10" dur="2.5s" repeatCount="indefinite"/>
                  </circle>
                  <circle cx={((iss.longitude+180)/360)*720} cy={((90-iss.latitude)/180)*300} r="4" fill="#58a6ff"/>
                  <text x={((iss.longitude+180)/360)*720+8} y={((90-iss.latitude)/180)*300-5} fill="#58a6ff" fontSize="10" fontWeight="bold" fontFamily="monospace">ISS</text>
                </g>
              )}
            </svg>
          </div>
          <div style={{marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,fontSize:10}}>
            <KV l="INCL" v="51.64°" c="#58a6ff"/>
            <KV l="PERIOD" v="92.68m" c="#58a6ff"/>
            <KV l="APOG" v="422 km" c="#58a6ff"/>
            <KV l="PERIG" v="418 km" c="#58a6ff"/>
          </div>
        </ConsoleCard>

        {/* ─── ETHOS — Life Support ─── */}

          <div style={{marginTop:6,display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,fontSize:10}}>
            <KV l="1A V" v={tmNum("S0000001","151.2",1)+"V"} c="#d29922"/>
            <KV l="1A I" v={tmNum("S0000002","42.1",1)+"A"} c="#d29922"/>
            <KV l="1B V" v={tmNum("S0000003","150.8",1)+"V"} c="#d29922"/>
            <KV l="1B I" v={tmNum("S0000004","41.7",1)+"A"} c="#d29922"/>

// ═══════════════════════════════════════════════════════════════════════
//  SUB-COMPONENTS
// ═══════════════════════════════════════════════════════════════════════
function ConsoleCard({console,children}){
  return (
    <div className="console-card" style={{borderLeft:"3px solid "+console.color}}>
      <div className="console-header">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:console.color,fontSize:14}}>{console.icon}</span>
          <span className="console-tag" style={{color:console.color,background:console.color+"15",border:"1px solid "+console.color+"33"}}>{console.name}</span>
          <span style={{color:"#8b949e",fontSize:11}}>{console.fullName}</span>
        </div>
      </div>
      <div style={{fontSize:9,color:"#6e7681",marginBottom:8,lineHeight:1.4}}>{console.scope}</div>
      {children}
    </div>
  );
}

function KV({l,v,c}){
  return (
    <div style={{padding:"4px 6px",background:"#161b22",border:"1px solid #21262d",borderRadius:3}}>
      <div style={{fontSize:8,color:"#6e7681",letterSpacing:0.5,textTransform:"uppercase"}}>{l}</div>
      <div style={{color:c||"#c9d1d9",fontSize:11,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{v}</div>
    </div>
  );
}

function MetricWithBar({label,value,unit,pct,color,sub}){
  return (
    <div style={{marginBottom:7}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
        <span style={{color:"#8b949e"}}>{label}</span>
        <span style={{color:color,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{value} <span style={{color:"#6e7681",fontSize:9}}>{unit}</span></span>
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{width:pct+"%",background:color}}/>
      </div>
      {sub && <div style={{fontSize:8,color:"#6e7681",marginTop:2}}>{sub}</div>}
    </div>
  );
}

function SignalBar({label,status,pct,color}){
  return (
    <div style={{padding:"5px 7px",background:"#161b22",border:"1px solid #21262d",borderRadius:3}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
        <span style={{color:"#8b949e",fontSize:10}}>{label}</span>
        <span style={{color:color,fontSize:9,fontWeight:700,padding:"1px 5px",border:"1px solid "+color+"44",borderRadius:2}}>{status}</span>
      </div>
      <div className="progress-track" style={{height:3}}>
        <div className="progress-fill" style={{width:pct+"%",background:color}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StationCommander/>);
</script>
</body>
</html>
